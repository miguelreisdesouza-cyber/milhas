services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - aureon_mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - backend/.env
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: aureon
      CORS_ORIGINS: http://localhost:8080
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_BACKEND_URL: ""
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  aureon_mongo:
